services:
  db:
    image: postgres:16-alpine
    container_name: postgres_lms
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $POSTGRES_DB -U $POSTGRES_USER" ]
      interval: 30s
      retries: 5
      timeout: 10s
    networks:
      - lms-network

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    networks:
      - lms-network
    volumes:
      - redis_data:/data
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    env_file: .env
    command:
      sh -c "python manage.py collectstatic --noinput && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
    networks:
      - lms-network
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    command: celery -A config worker --loglevel=info
    env_file:
      - .env
    networks:
      - lms-network
    depends_on:
      - redis
      - db

  celery-beat:
    build: .
    command: celery -A config beat --loglevel=info
    env_file:
      - .env
    networks:
      - lms-network
    depends_on:
      - redis
      - db

  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
    networks:
      - lms-network
    depends_on:
      - app


networks:
  lms-network:
    driver: bridge

volumes:
  postgres-data:
  redis_data:
  static_volume:
